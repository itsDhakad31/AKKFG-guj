version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: akkfg-gujarat-app
    container_name: akkfg_web_app
    ports:
      - "3000:3000"
      - "24679:24679" # Vite HMR port
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WS_PORT=24679
    command: npm run server
